<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#009999">
<title>辐射安全考试题库</title>
<style>
:root {
  --primary: #009999;
  --primary-light: #e6f3f3;
  --bg: #f5f7f7;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #6e7e7e;
  --separator: #dde5e5;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
  --correct: #34c759;
  --correct-bg: #e8f8ed;
  --wrong: #ff3b30;
  --wrong-bg: #fff0ef;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
.app { max-width: 640px; margin: 0 auto; min-height: 100vh; min-height: -webkit-fill-available; }

/* Header */
.header {
  padding: 20px 20px 12px;
  padding-top: calc(20px + env(safe-area-inset-top));
  text-align: center;
  position: sticky; top: 0; z-index: 100;
  background: transparent;
  pointer-events: none;
}
.header > * { pointer-events: auto; }
.header h1 {
  font-size: 20px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.header .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.header .progress-bar {
  height: 3px;
  background: var(--separator);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.header .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }
.header .back-btn {
  position: absolute;
  left: calc(8px + env(safe-area-inset-left)); top: calc(14px + env(safe-area-inset-top));
  background: var(--surface);
  border: none;
  color: var(--text);
  width: 38px; height: 38px;
  border-radius: 50%;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}

/* Section title */
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0 20px;
  margin-bottom: 12px;
}

/* Home */
.home { padding: 8px 16px 32px; }

.stat-strip {
  background: var(--surface);
  margin: 12px 4px 24px;
  border-radius: var(--radius);
  display: flex;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.stat-item {
  flex: 1;
  padding: 18px 8px;
  text-align: center;
  position: relative;
}
.stat-item + .stat-item::before {
  content: "";
  position: absolute;
  left: 0; top: 25%; height: 50%;
  width: 1px;
  background: var(--separator);
}
.stat-item .num {
  font-size: 24px; font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}
.stat-item .label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
  font-weight: 500;
}

.mode-group { margin-bottom: 20px; }
.mode-card {
  background: var(--surface);
  border-radius: var(--radius);
  margin: 0 4px 8px;
  padding: 18px 20px;
  cursor: pointer;
  display: flex; align-items: center; gap: 16px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s, box-shadow 0.15s;
}
.mode-card:active {
  transform: scale(0.985);
  box-shadow: var(--shadow-md);
}
.mode-card-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 20px;
}
.mode-card-body { flex: 1; }
.mode-card-title { font-size: 16px; font-weight: 600; color: var(--text); }
.mode-card-desc { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
.mode-card-arrow { color: var(--text-secondary); font-size: 18px; }

/* Category */
.cat-screen { padding: 8px 16px 32px; }
.cat-group { margin-bottom: 24px; }
.cat-card {
  background: var(--surface);
  border-radius: var(--radius);
  margin: 0 4px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.cat-row {
  padding: 17px 20px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--separator);
}
.cat-row:last-child { border-bottom: none; }
.cat-row:active { background: var(--primary-light); }
.cat-row-label { font-size: 16px; font-weight: 500; color: var(--text); }
.cat-row-meta { font-size: 14px; color: var(--text-secondary); }

/* Count chips */
.count-row {
  display: flex;
  gap: 8px;
  padding: 8px 4px 4px;
  flex-wrap: wrap;
}
.count-chip {
  padding: 10px 20px;
  border-radius: 20px;
  background: var(--surface);
  border: 1.5px solid var(--separator);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  transition: all 0.15s;
}
.count-chip.selected {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* Quiz */
.question-card {
  background: var(--surface);
  margin: 4px 16px 0;
  border-radius: var(--radius);
  padding: 24px 20px 20px;
  box-shadow: var(--shadow-md);
}
.q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.q-tag {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  padding: 3px 10px;
  background: var(--bg);
  border-radius: 20px;
}
.q-tag.multi {
  color: var(--primary);
  background: var(--primary-light);
}
.q-num { font-size: 13px; color: var(--text-secondary); font-weight: 500; margin-left: auto; }
.q-text {
  font-size: 17px;
  line-height: 1.65;
  margin-bottom: 20px;
  font-weight: 500;
  color: var(--text);
}

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  border: 1.5px solid var(--separator);
  border-radius: var(--radius);
  padding: 15px 16px;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 12px;
  transition: border-color 0.15s, background-color 0.15s;
  font-size: 15px; line-height: 1.5;
  background: var(--surface);
}
.option:active { background: #f5f8f8; }
.option .opt-label {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--separator);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px;
  flex-shrink: 0;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.option.selected {
  border-color: var(--primary);
  background: var(--primary-light);
}
.option.selected .opt-label {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}
.option.correct {
  border-color: var(--correct);
  background: var(--correct-bg);
}
.option.correct .opt-label {
  background: var(--correct);
  border-color: var(--correct);
  color: #fff;
}
.option.wrong {
  border-color: var(--wrong);
  background: var(--wrong-bg);
}
.option.wrong .opt-label {
  background: var(--wrong);
  border-color: var(--wrong);
  color: #fff;
}
.option.disabled { pointer-events: none; }
.option.disabled:not(.correct):not(.wrong):not(.selected) { opacity: 0.35; }
.opt-content { flex: 1; padding-top: 2px; }

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  display: none;
  line-height: 1.5;
  animation: feedbackIn 0.2s ease-out;
}
.feedback.show { display: block; }
.feedback.correct { background: var(--correct-bg); color: #1a8a3a; }
.feedback.wrong { background: var(--wrong-bg); color: #c4271e; }
.feedback strong { font-size: 15px; }
@keyframes feedbackIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Nav buttons */
.nav-bar {
  display: flex;
  gap: 10px;
  padding: 16px 16px 24px;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
  max-width: 640px; margin: 0 auto;
}
.btn {
  flex: 1; padding: 15px; border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(0,153,153,0.2); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--separator); }
.btn-success { background: var(--correct); color: #fff; }

/* Results */
.results { padding: 8px 16px 32px; text-align: center; }
.score-ring { width: 140px; height: 140px; margin: 24px auto 8px; position: relative; display: flex; align-items: center; justify-content: center; }
.score-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
.score-ring .score-val { font-size: 42px; font-weight: 700; color: var(--primary); z-index: 1; letter-spacing: -0.02em; }

.results-strip {
  background: var(--surface);
  border-radius: var(--radius);
  display: flex;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  margin: 16px 4px;
}
.results-strip .stat-item .num { color: var(--primary); }

.results-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin: 0 4px;
  box-shadow: var(--shadow-sm);
  text-align: left;
}
.results-card h3 { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }

.review-item {
  padding: 14px 0;
  border-bottom: 1px solid var(--separator);
  font-size: 14px;
  line-height: 1.5;
}
.review-item:last-child { border-bottom: none; }
.review-item .ri-q { margin-bottom: 4px; }
.review-item .ri-correct { color: #1a8a3a; font-weight: 600; }
.review-item .ri-wrong { color: #c4271e; font-weight: 600; }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

<!-- HOME -->
<div id="homeScreen">
  <div class="header">
    <h1>辐射安全考核题库</h1>
    <div class="subtitle">科研、生产及其他 · 2022年1月版 · 共419题</div>
  </div>
  <div class="home">
    <div class="stat-strip">
      <div class="stat-item"><div class="num" id="statTotal">419</div><div class="label">总题数</div></div>
      <div class="stat-item"><div class="num" id="statAnswered">0</div><div class="label">已练习</div></div>
      <div class="stat-item"><div class="num" id="statCorrect">0</div><div class="label">正确数</div></div>
      <div class="stat-item"><div class="num" id="statRate">0%</div><div class="label">正确率</div></div>
    </div>

    <div class="section-title">练习模式</div>
    <div class="mode-group">
      <div class="mode-card" onclick="showCategory('practice')">
        <div class="mode-card-icon" style="background:var(--primary-light);color:var(--primary)">→</div>
        <div class="mode-card-body">
          <div class="mode-card-title">顺序练习</div>
          <div class="mode-card-desc">按章节顺序刷题，即时出答案</div>
        </div>
        <span class="mode-card-arrow">›</span>
      </div>
      <div class="mode-card" onclick="showCategory('random')">
        <div class="mode-card-icon" style="background:var(--primary-light);color:var(--primary)">⇄</div>
        <div class="mode-card-body">
          <div class="mode-card-title">随机练习</div>
          <div class="mode-card-desc">打乱顺序，全面复习</div>
        </div>
        <span class="mode-card-arrow">›</span>
      </div>
      <div class="mode-card" onclick="showCategory('exam')">
        <div class="mode-card-icon" style="background:var(--primary-light);color:var(--primary)">◉</div>
        <div class="mode-card-body">
          <div class="mode-card-title">模拟考试</div>
          <div class="mode-card-desc">随机抽题，限时计分</div>
        </div>
        <span class="mode-card-arrow">›</span>
      </div>
    </div>

    <div class="section-title">其他</div>
    <div class="mode-group">
      <div class="mode-card" onclick="reviewWrong()">
        <div class="mode-card-icon" style="background:var(--wrong-bg);color:#c4271e">✕</div>
        <div class="mode-card-body">
          <div class="mode-card-title">错题回顾</div>
          <div class="mode-card-desc" id="wrongCount">还没有错题记录</div>
        </div>
        <span class="mode-card-arrow">›</span>
      </div>
      <div class="mode-card" onclick="resetProgress()">
        <div class="mode-card-icon" style="background:var(--bg);color:var(--text-secondary)">△</div>
        <div class="mode-card-body">
          <div class="mode-card-title">重置进度</div>
          <div class="mode-card-desc">清除所有练习记录</div>
        </div>
        <span class="mode-card-arrow">›</span>
      </div>
    </div>
  </div>
</div>

<!-- CATEGORY SELECTOR -->
<div id="catScreen" class="hidden">
  <div class="header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h1 id="catTitle">选择类别</h1>
  </div>
  <div class="cat-screen" id="catContent"></div>
</div>

<!-- EXAM COUNT SELECTOR -->
<div id="countScreen" class="hidden">
  <div class="header">
    <button class="back-btn" onclick="goHome()">‹</button>
    <h1>模拟考试</h1>
  </div>
  <div class="cat-screen">
    <div class="section-title">选择题量</div>
    <div class="count-row" id="countSelector">
      <div class="count-chip" onclick="selectCount(20)">20题</div>
      <div class="count-chip" onclick="selectCount(50)">50题</div>
      <div class="count-chip selected" onclick="selectCount(100)">100题</div>
      <div class="count-chip" onclick="selectCount(200)">200题</div>
      <div class="count-chip" onclick="selectCount(419)">全部</div>
    </div>
    <div class="section-title" style="margin-top:24px">出题范围</div>
    <div class="cat-group">
      <div class="cat-card">
        <div class="cat-row" onclick="startExam('all')">
          <span class="cat-row-label">全部题库</span>
          <span class="cat-row-meta">419题</span>
        </div>
        <div class="cat-row" onclick="startExam('p1')">
          <span class="cat-row-label">电离辐射基础</span>
          <span class="cat-row-meta">297题</span>
        </div>
        <div class="cat-row" onclick="startExam('p2')">
          <span class="cat-row-label">法律法规</span>
          <span class="cat-row-meta">122题</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="hidden">
  <div class="header">
    <button class="back-btn" onclick="quitQuiz()">‹</button>
    <h1 id="quizTitle">练习中</h1>
    <div class="subtitle" id="quizSubtitle">第 1 / 50 题</div>
    <div class="progress-bar"><div class="progress-fill" id="quizProgress" style="width:0%"></div></div>
  </div>
  <div id="questionArea"></div>
  <div class="nav-bar">
    <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="hidden">
  <div class="header">
    <h1>考试成绩</h1>
  </div>
  <div class="results">
    <div class="score-ring">
      <svg width="140" height="140">
        <circle cx="70" cy="70" r="62" fill="none" stroke="var(--separator)" stroke-width="6"/>
        <circle id="scoreRing" cx="70" cy="70" r="62" fill="none" stroke="var(--primary)" stroke-width="6" stroke-linecap="round" stroke-dasharray="389.56" stroke-dashoffset="389.56" style="transition:stroke-dashoffset 0.8s"/>
      </svg>
      <div class="score-val" id="scoreText">0</div>
    </div>
    <div id="examTime" style="font-size:13px;color:var(--text-secondary);margin-bottom:8px"></div>
    <div class="results-strip">
      <div class="stat-item"><div class="num" id="resCorrect">0</div><div class="label">正确</div></div>
      <div class="stat-item"><div class="num" id="resWrong">0</div><div class="label">错误</div></div>
    </div>
    <div class="results-card" id="reviewList" style="display:none">
      <h3>错题回顾</h3>
      <div id="reviewItems"></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;padding:0 4px">
      <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
      <button class="btn btn-primary" onclick="retryExam()">再考一次</button>
    </div>
  </div>
</div>

</div>

// State
let state = {
  mode: null,        // 'practice', 'random', 'exam'
  questions: [],     // current quiz questions
  currentIdx: 0,
  answers: {},       // {qid: [selected options]}
  submitted: new Set(), // multi-choice submitted question IDs
  startTime: 0,
  examCount: 100,
  examScope: 'all',
  selectedCount: 100,
};

// Progress storage
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('radExam_progress') || '{}'); }
  catch(e) { return {}; }
}
function saveProgress(p) {
  try { localStorage.setItem('radExam_progress', JSON.stringify(p)); } catch(e) {}
}
let progress = loadProgress();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Stats
function updateHomeStats() {
  const answered = Object.keys(progress).length;
  let correct = 0;
  Object.values(progress).forEach(v => { if (v.correct) correct++; });
  document.getElementById('statAnswered').textContent = answered;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statRate').textContent = answered > 0 ? Math.round(correct/answered*100) + '%' : '0%';

  const wrongIds = Object.entries(progress).filter(([k,v]) => !v.correct).map(([k]) => parseInt(k));
  document.getElementById('wrongCount').textContent = wrongIds.length > 0
    ? wrongIds.length + ' 道错题待复习' : '还没有错题记录';
}

// Category selection
function showCategory(mode) {
  state.mode = mode;
  if (mode === 'exam') {
    document.getElementById('homeScreen').classList.add('hidden');
    document.getElementById('countScreen').classList.remove('hidden');
    return;
  }

  const screen = document.getElementById('catScreen');
  const content = document.getElementById('catContent');
  document.getElementById('catTitle').textContent = mode === 'practice' ? '顺序练习' : '随机练习';
  document.getElementById('homeScreen').classList.add('hidden');
  screen.classList.remove('hidden');

  const cats = [
    {key:'p1s', name:'第一部分 · 单选题', count: QUESTIONS.filter(q=>q.part===1&&q.type==='single').length, filter: q=>q.part===1&&q.type==='single'},
    {key:'p1m', name:'第一部分 · 多选题', count: QUESTIONS.filter(q=>q.part===1&&q.type==='multi').length, filter: q=>q.part===1&&q.type==='multi'},
    {key:'p1a', name:'第一部分 · 全部', count: QUESTIONS.filter(q=>q.part===1).length, filter: q=>q.part===1},
    {key:'p2s', name:'第二部分 · 单选题', count: QUESTIONS.filter(q=>q.part===2&&q.type==='single').length, filter: q=>q.part===2&&q.type==='single'},
    {key:'p2m', name:'第二部分 · 多选题', count: QUESTIONS.filter(q=>q.part===2&&q.type==='multi').length, filter: q=>q.part===2&&q.type==='multi'},
    {key:'p2a', name:'第二部分 · 全部', count: QUESTIONS.filter(q=>q.part===2).length, filter: q=>q.part===2},
    {key:'all', name:'全部题库', count: QUESTIONS.length, filter: q=>true},
  ];

  content.innerHTML = cats.map(c => `
    <div class="cat-group">
      <div class="cat-card" onclick="startPractice('${c.key}')">
        <div class="cat-row" style="border:none">
          <span class="cat-row-label">${c.name}</span>
          <span class="cat-row-meta">${c.count}题</span>
        </div>
      </div>
    </div>
  `).join('');
}

function startPractice(catKey) {
  let qs = QUESTIONS;
  const filters = {
    p1s: q=>q.part===1&&q.type==='single',
    p1m: q=>q.part===1&&q.type==='multi',
    p1a: q=>q.part===1,
    p2s: q=>q.part===2&&q.type==='single',
    p2m: q=>q.part===2&&q.type==='multi',
    p2a: q=>q.part===2,
    all: q=>true,
  };
  qs = QUESTIONS.filter(filters[catKey] || (q=>true));
  if (state.mode === 'random') qs = shuffle(qs);

  state.questions = qs;
  state.currentIdx = 0;
  state.answers = {};
  state.submitted = new Set();
  state.startTime = Date.now();

  document.getElementById('catScreen').classList.add('hidden');
  showQuiz();
}

// Exam mode
function selectCount(n) {
  state.selectedCount = n;
  document.querySelectorAll('#countSelector .count-chip').forEach(c => c.classList.remove('selected'));
  event.target.classList.add('selected');
}

function startExam(scope) {
  state.examScope = scope;
  let pool = QUESTIONS;
  if (scope === 'p1') pool = QUESTIONS.filter(q=>q.part===1);
  else if (scope === 'p2') pool = QUESTIONS.filter(q=>q.part===2);

  const count = Math.min(state.selectedCount, pool.length);
  // Maintain ratio: ~72% single, ~28% multi
  const singles = shuffle(pool.filter(q=>q.type==='single'));
  const multis = shuffle(pool.filter(q=>q.type==='multi'));
  const targetMulti = Math.round(count * 0.28);
  const targetSingle = count - targetMulti;

  let exam = [];
  exam = exam.concat(singles.slice(0, targetSingle));
  exam = exam.concat(multis.slice(0, targetMulti));
  exam = shuffle(exam);

  state.questions = exam;
  state.currentIdx = 0;
  state.answers = {};
  state.submitted = new Set();
  state.startTime = Date.now();

  document.getElementById('countScreen').classList.add('hidden');
  state.mode = 'exam';
  showQuiz();
}

// Quiz rendering
function showQuiz() {
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');

  const isExam = state.mode === 'exam';
  document.getElementById('quizTitle').textContent =
    isExam ? '📝 模拟考试' : (state.mode === 'random' ? '🔀 随机练习' : '📖 顺序练习');

  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentIdx];
  const total = state.questions.length;
  const idx = state.currentIdx;
  const isExam = state.mode === 'exam';

  document.getElementById('quizSubtitle').textContent = `第 ${idx+1} / ${total} 题`;
  document.getElementById('quizProgress').style.width = ((idx+1)/total*100) + '%';

  const isMulti = q.type === 'multi';
  const correctAns = q.answer;

  // Determine saved answer and lock state
  let savedAns = state.answers[q.id] || [];
  let isLocked = false;

  if (isMulti) {
    // Multi: locked only after explicit submit
    isLocked = state.submitted.has(q.id);
  } else {
    // Single: locked immediately on selection
    isLocked = savedAns.length > 0;
  }

  // Also check progress for practice mode (returning to answered questions)
  if (!isExam && progress[q.id] && !isLocked) {
    savedAns = progress[q.id].selected || [];
    isLocked = true;
  }

  const isCorrect = savedAns.length > 0 &&
    correctAns.every(a => savedAns.includes(a)) &&
    savedAns.every(a => correctAns.includes(a));

  // Build options
  let optionsHTML = '';
  const optKeys = ['A','B','C','D','E'].filter(k => q.options[k]);

  optKeys.forEach(key => {
    let classes = 'option';
    const isSel = savedAns.includes(key);
    const isCorrectOpt = correctAns.includes(key);

    if (isLocked) {
      classes += ' disabled';
      if (isCorrectOpt) classes += ' correct';
      if (isSel && !isCorrectOpt) classes += ' wrong';
    } else if (isSel) {
      classes += ' selected';
    }

    optionsHTML += `<div class="${classes}" data-opt="${key}" onclick="selectOption('${key}')">
        <div class="opt-label">${key}</div>
        <div class="opt-content">${q.options[key] || '<i style="color:var(--text-secondary)">[图片选项]</i>'}</div>
      </div>`;
  });

  // Feedback (show in all modes since user wants instant answers)
  let feedbackHTML = '';
  if (isLocked) {
    if (isCorrect) {
      feedbackHTML = `<div class="feedback show correct"><strong>✓ 回答正确！</strong></div>`;
    } else {
      feedbackHTML = `<div class="feedback show wrong"><strong>✗ 回答错误</strong><br>正确答案：${correctAns.join('、')}${isMulti ? '（多选）' : ''}</div>`;
    }
  }

  // Submit button for multi (shown when selections exist but not yet submitted)
  let multiSubmitHTML = '';
  if (isMulti && !isLocked && savedAns.length > 0) {
    multiSubmitHTML = `<button class="btn btn-primary" style="margin-top:14px;width:100%" onclick="submitMulti(${q.id})">确认答案（已选${savedAns.length}项）</button>`;
  } else if (isMulti && !isLocked) {
    multiSubmitHTML = `<p style="margin-top:12px;font-size:13px;color:var(--text-secondary);text-align:center">多选题：请选择所有正确选项后点击确认</p>`;
  }

  document.getElementById('questionArea').innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag ${isMulti?'multi':''}">${isMulti?'多选题':'单选题'}</span>
        <span class="q-tag">${q.partName}</span>
        <span class="q-num">第${q.num}题</span>
      </div>
      <div class="q-text">${q.text}${q.hasImage ? '<div style="margin-top:8px;color:var(--text-secondary);font-size:13px">⚠️ 本题含图片选项，请参考原PDF</div>' : ''}</div>
      <div class="options">${optionsHTML}</div>
      ${multiSubmitHTML}
      ${feedbackHTML}
    </div>`;

  // Nav buttons
  document.getElementById('prevBtn').style.display = idx > 0 ? '' : 'none';
  const nextBtn = document.getElementById('nextBtn');
  if (idx === total - 1) {
    nextBtn.textContent = '完成 ✅';
    nextBtn.classList.remove('btn-primary');
    nextBtn.classList.add('btn-success');
  } else {
    nextBtn.textContent = '下一题';
    nextBtn.classList.add('btn-primary');
    nextBtn.classList.remove('btn-success');
  }
}

function submitMulti(qid) {
  state.submitted.add(qid);
  const q = state.questions[state.currentIdx];
  const sel = state.answers[qid] || [];
  const correct = q.answer;
  const isCorrect = sel.length > 0 && correct.every(a => sel.includes(a)) && sel.every(a => correct.includes(a));
  progress[qid] = { selected: sel, correct: isCorrect };
  saveProgress(progress);
  updateHomeStats();
  renderQuestion();
}

function selectOption(key) {
  const q = state.questions[state.currentIdx];
  const isMulti = q.type === 'multi';

  // Already locked? Do nothing
  if (isMulti && state.submitted.has(q.id)) return;
  if (!isMulti && state.answers[q.id] && state.answers[q.id].length > 0) return;
  if (progress[q.id] && state.mode !== 'exam') return;

  if (!state.answers[q.id]) state.answers[q.id] = [];

  if (isMulti) {
    // Toggle selection
    const idx = state.answers[q.id].indexOf(key);
    if (idx >= 0) {
      state.answers[q.id].splice(idx, 1);
    } else {
      state.answers[q.id].push(key);
    }
    renderQuestion();
  } else {
    // Single choice: immediate lock + feedback
    state.answers[q.id] = [key];
    const correct = q.answer;
    const isCorrect = correct.includes(key);
    progress[q.id] = { selected: [key], correct: isCorrect };
    saveProgress(progress);
    updateHomeStats();
    renderQuestion();
  }
}

function prevQuestion() {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    renderQuestion();
  }
}

function nextQuestion() {
  if (state.currentIdx < state.questions.length - 1) {
    state.currentIdx++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function finishQuiz() {
  const total = state.questions.length;
  let correct = 0;
  let wrongList = [];

  state.questions.forEach(q => {
    let sel = state.answers[q.id] || [];
    const ans = q.answer;
    const isCorrect = sel.length > 0 && ans.every(a => sel.includes(a)) && sel.every(a => ans.includes(a));
    if (isCorrect) {
      correct++;
      // Update progress
      progress[q.id] = { selected: sel, correct: true };
    } else {
      wrongList.push({ q, selected: sel });
      progress[q.id] = { selected: sel, correct: false };
    }
  });
  saveProgress(progress);

  const score = Math.round(correct / total * 100);
  const elapsed = Math.round((Date.now() - state.startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  // Results screen
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.remove('hidden');

  document.getElementById('scoreText').textContent = score;
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resWrong').textContent = total - correct;
  document.getElementById('examTime').textContent = `用时 ${mins}分${secs}秒 · 共${total}题`;

  // Animate score ring
  const circumference = 389.56;
  const offset = circumference * (1 - score / 100);
  setTimeout(() => {
    document.getElementById('scoreRing').style.strokeDashoffset = offset;
    document.getElementById('scoreRing').style.stroke = score >= 60 ? 'var(--correct)' : 'var(--wrong)';
  }, 100);

  // Wrong review
  if (wrongList.length > 0) {
    document.getElementById('reviewList').style.display = 'block';
    document.getElementById('reviewItems').innerHTML = wrongList.map(({q, selected}) => `
      <div class="review-item">
        <div class="ri-q"><strong>第${q.num}题</strong> [${q.type==='multi'?'多选':'单选'}] ${q.text.substring(0,80)}${q.text.length>80?'...':''}</div>
        <div class="ri-ans">
          <span class="ri-wrong">你选：${selected.length ? selected.join('、') : '未答'}</span>
          &nbsp;|&nbsp;
          <span class="ri-correct">正确：${q.answer.join('、')}</span>
        </div>
      </div>
    `).join('');
  } else {
    document.getElementById('reviewList').style.display = 'none';
  }
}

function retryExam() {
  document.getElementById('resultsScreen').classList.add('hidden');
  if (state.mode === 'exam') {
    startExam(state.examScope);
  } else {
    goHome();
  }
}

function quitQuiz() {
  if (confirm('确定要退出吗？当前进度将不会保存。')) {
    document.getElementById('quizScreen').classList.add('hidden');
    goHome();
  }
}

function goHome() {
  document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden'));
  document.getElementById('homeScreen').classList.remove('hidden');
  updateHomeStats();
}

function reviewWrong() {
  const wrongIds = Object.entries(progress).filter(([k,v]) => !v.correct && !k.endsWith('_submitted')).map(([k]) => parseInt(k)).filter(n => !isNaN(n));
  if (wrongIds.length === 0) {
    alert('还没有错题记录，先去做几道题吧！');
    return;
  }
  state.mode = 'random';
  state.questions = shuffle(QUESTIONS.filter(q => wrongIds.includes(q.id)));
  state.currentIdx = 0;
  state.answers = {};
  state.submitted = new Set();
  document.getElementById('homeScreen').classList.add('hidden');
  showQuiz();
}

function resetProgress() {
  if (confirm('确定要清除所有练习记录吗？此操作不可撤销。')) {
    progress = {};
    saveProgress(progress);
    updateHomeStats();
  }
}

// Init
updateHomeStats();

// Prevent double-tap zoom on iOS
document.addEventListener('gesturestart', e => e.preventDefault());
let lastTouch = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouch <= 300) e.preventDefault();
  lastTouch = now;
}, { passive: false });
</script>
